<div class="flex flex-col min-h-screen">
    <!-- Interactive Navbar -->
    <app-navbar></app-navbar>

    <!-- Main Content Route Area -->
    <main class="flex-grow pt-[72px]" [@routeAnimations]="getRouteAnimationData()">
        <router-outlet></router-outlet>
    </main>

    <!-- Footer -->
    <app-footer></app-footer>

    <!-- Scroll To Top Button -->
    <button
        (click)="scrollToTop()"
        [class.opacity-100]="showScrollTop()"
        [class.translate-y-0]="showScrollTop()"
        [class.opacity-0]="!showScrollTop()"
        [class.translate-y-16]="!showScrollTop()"
        [class.pointer-events-none]="!showScrollTop()"
        aria-label="Scroll to top"
        class="fixed bottom-6 right-6 z-50 w-12 h-12 rounded-full shadow-2xl flex items-center justify-center transition-all duration-300 ease-in-out bg-[var(--color-saffron)] hover:bg-[var(--color-saffron-hover)] text-white hover:scale-110 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
    </button>
</div>
