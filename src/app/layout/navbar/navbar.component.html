<!-- Navbar: tinted surface + stronger presence on scroll (not flat white) -->
<nav
    class="fixed top-0 w-full z-50 border-b transition-[background-color,box-shadow,border-color] duration-300 ease-out backdrop-blur-xl"
    [ngClass]="{
      'bg-[var(--color-nav-surface)]/95 border-[var(--color-forest)]/10 shadow-sm': !isScrolled,
      'bg-[var(--color-nav-surface-scrolled)]/98 border-[var(--color-forest)]/18 shadow-md': isScrolled
    }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-[72px]">

            <!-- Logo Area -->
            <div class="flex-shrink-0 flex items-center cursor-pointer" routerLink="/">
                <span class="font-heading font-bold text-2xl text-[var(--color-forest)] tracking-tight">Kedar
                    Yatra</span>
                <span class="font-heading font-medium text-2xl text-[var(--color-saffron)] ml-1">Resort</span>
            </div>

            <!-- Desktop Navigation Links -->
            <div class="hidden md:flex items-center gap-1 lg:gap-2">
                <a routerLink="/"
                    routerLinkActive="text-[var(--color-forest)] bg-[var(--color-forest)]/10"
                    [routerLinkActiveOptions]="{exact: true}"
                    class="text-gray-600 hover:text-[var(--color-forest)] px-3 py-2 rounded-full text-sm font-medium transition-colors hover:bg-[var(--color-forest)]/5">Home</a>
                <a routerLink="/rooms"
                    routerLinkActive="text-[var(--color-forest)] bg-[var(--color-forest)]/10"
                    class="text-gray-600 hover:text-[var(--color-forest)] px-3 py-2 rounded-full text-sm font-medium transition-colors hover:bg-[var(--color-forest)]/5">Rooms
                    & Suites</a>
                <a routerLink="/gallery"
                    routerLinkActive="text-[var(--color-forest)] bg-[var(--color-forest)]/10"
                    class="text-gray-600 hover:text-[var(--color-forest)] px-3 py-2 rounded-full text-sm font-medium transition-colors hover:bg-[var(--color-forest)]/5">Gallery</a>
                <a routerLink="/travel"
                    routerLinkActive="text-[var(--color-forest)] bg-[var(--color-forest)]/10"
                    class="text-gray-600 hover:text-[var(--color-forest)] px-3 py-2 rounded-full text-sm font-medium transition-colors hover:bg-[var(--color-forest)]/5">Travel</a>
                <a routerLink="/contact"
                    routerLinkActive="text-[var(--color-forest)] bg-[var(--color-forest)]/10"
                    class="text-gray-600 hover:text-[var(--color-forest)] px-3 py-2 rounded-full text-sm font-medium transition-colors hover:bg-[var(--color-forest)]/5">Location</a>

                <!-- CTA Button -->
                <a href="https://wa.me/917467840098?text=Hi,%20I%20would%20like%20to%20inquire%20about%20a%20booking%20at%20Kedar%20Yatra%20Resort."
                    target="_blank"
                    rel="noopener noreferrer"
                    class="ml-2 lg:ml-4 inline-flex items-center justify-center px-5 py-2.5 border border-transparent rounded-full text-sm font-semibold text-white bg-[var(--color-forest)] hover:bg-[var(--color-forest-dark)] shadow-sm hover:shadow-md transition-all duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-[var(--color-forest)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-2" fill="currentColor"
                        viewBox="0 0 24 24">
                        <path
                            d="M11.944 0A12 12 0 000 12a12 12 0 003.844 8.844l-1.353 4.931 5.045-1.321A11.967 11.967 0 0012 24a12 12 0 000-24zm0 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-1.879-14c-.161-.355-.333-.362-.511-.368h-.431c-.179 0-.466.066-.711.332-.244.266-.931.914-.931 2.228 0 1.314.953 2.585 1.086 2.763.133.177 1.866 2.943 4.604 4.075 1.77.733 2.454.78 3.526.657 1.066-.123 2.016-.807 2.302-1.589.286-.782.286-1.455.2-1.589-.086-.134-.32-.214-.675-.392-.355-.178-2.106-1.04-2.433-1.159-.327-.119-.567-.179-.806.178-.24.356-.92 1.157-1.127 1.393-.207.236-.415.265-.77.087-1.385-.688-2.37-1.4-3.14-2.581-.22-.338.224-.316.574-.997.106-.178.053-.334-.035-.512-.089-.178-.806-1.942-1.104-2.658z" />
                    </svg>
                    Book via WhatsApp
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <div class="md:hidden flex items-center">
                <button type="button" (click)="toggleMenu()"
                    class="inline-flex items-center justify-center p-2 rounded-xl text-gray-600 hover:text-[var(--color-forest)] hover:bg-[var(--color-forest)]/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-[var(--color-forest)]"
                    [attr.aria-expanded]="isMobileMenuOpen"
                    aria-controls="mobile-nav-panel">
                    <span class="sr-only">Open main menu</span>
                    <!-- Icon when menu is closed -->
                    <svg *ngIf="!isMobileMenuOpen" class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                    <!-- Icon when menu is open -->
                    <svg *ngIf="isMobileMenuOpen" class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

        </div>
    </div>

    <!-- Mobile Menu, show/hide based on menu state. -->
    <div id="mobile-nav-panel" [@menuAnimation]="getMenuAnimParams()" class="md:hidden border-t border-[var(--color-forest)]/10 bg-[var(--color-nav-surface)]/98 shadow-inner overflow-hidden max-h-[min(70vh,calc(100dvh-72px))] overflow-y-auto overscroll-contain"
        *ngIf="isMobileMenuOpen">
        <div class="px-2 pt-2 pb-6 space-y-1 sm:px-3 flex flex-col items-stretch mt-2">
            <a routerLink="/" (click)="toggleMenu()" routerLinkActive="bg-[var(--color-forest)] text-white shadow-sm"
                [routerLinkActiveOptions]="{exact: true}"
                class="w-full text-center hover:bg-[var(--color-forest)]/10 text-gray-700 block px-3 py-3.5 rounded-xl text-base font-medium transition-colors">Home</a>
            <a routerLink="/rooms" (click)="toggleMenu()" routerLinkActive="bg-[var(--color-forest)] text-white shadow-sm"
                class="w-full text-center hover:bg-[var(--color-forest)]/10 text-gray-700 block px-3 py-3.5 rounded-xl text-base font-medium transition-colors">Rooms
                & Suites</a>
            <a routerLink="/gallery" (click)="toggleMenu()" routerLinkActive="bg-[var(--color-forest)] text-white shadow-sm"
                class="w-full text-center hover:bg-[var(--color-forest)]/10 text-gray-700 block px-3 py-3.5 rounded-xl text-base font-medium transition-colors">Gallery</a>
            <a routerLink="/travel" (click)="toggleMenu()" routerLinkActive="bg-[var(--color-forest)] text-white shadow-sm"
                class="w-full text-center hover:bg-[var(--color-forest)]/10 text-gray-700 block px-3 py-3.5 rounded-xl text-base font-medium transition-colors">Travel</a>
            <a routerLink="/contact" (click)="toggleMenu()" routerLinkActive="bg-[var(--color-forest)] text-white shadow-sm"
                class="w-full text-center hover:bg-[var(--color-forest)]/10 text-gray-700 block px-3 py-3.5 rounded-xl text-base font-medium transition-colors">Location</a>

            <!-- CTA Mobile -->
            <a href="https://wa.me/917467840098?text=Hi,%20I%20would%20like%20to%20inquire%20about%20a%20booking%20at%20Kedar%20Yatra%20Resort."
                target="_blank"
                rel="noopener noreferrer"
                class="mt-4 w-full flex items-center justify-center px-6 py-3.5 border border-transparent rounded-full shadow-md text-base font-semibold text-white bg-[var(--color-forest)] hover:bg-[var(--color-forest-dark)] active:scale-[0.99] transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M11.944 0A12 12 0 000 12a12 12 0 003.844 8.844l-1.353 4.931 5.045-1.321A11.967 11.967 0 0012 24a12 12 0 000-24zm0 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-1.879-14c-.161-.355-.333-.362-.511-.368h-.431c-.179 0-.466.066-.711.332-.244.266-.931.914-.931 2.228 0 1.314.953 2.585 1.086 2.763.133.177 1.866 2.943 4.604 4.075 1.77.733 2.454.78 3.526.657 1.066-.123 2.016-.807 2.302-1.589.286-.782.286-1.455.2-1.589-.086-.134-.32-.214-.675-.392-.355-.178-2.106-1.04-2.433-1.159-.327-.119-.567-.179-.806.178-.24.356-.92 1.157-1.127 1.393-.207.236-.415.265-.77.087-1.385-.688-2.37-1.4-3.14-2.581-.22-.338.224-.316.574-.997.106-.178.053-.334-.035-.512-.089-.178-.806-1.942-1.104-2.658z" />
                </svg>
                Book via WhatsApp
            </a>
        </div>
    </div>
</nav>
